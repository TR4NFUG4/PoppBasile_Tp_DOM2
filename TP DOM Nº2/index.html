<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add" />
</head>

<body>
    <div class="contenedorMain">
        <h1>Lista de tareas</h1>
        <div class="task-row">
            <input id="taskInput" type="text" placeholder="Escribe una tarea" />
            <button id="addTaskBtn" type="button"><span class="material-symbols-outlined">add</span></button>
        </div>
        <ul id="taskList"></ul>

        <h2>Contador de tareas</h2>
        <p id="taskCount">Tareas totales: <span id="totales">0</span></p>
        <p id="taskCount">Tareas completadas: <span id="completadas">0</span></p>
        <p id="taskCount">Tareas pendientes: <span id="pendientes">0</span></p>
    </div>


    <script src="./script.js"></script>
</body>

</html>
